# =====================================================
# APPLICATION
# =====================================================

spring.application.name=Car Rental Backend


# =====================================================
# SERVER
# =====================================================

server.port=${PORT:8081}

server.address=0.0.0.0

# Automatically adds /api before every controller
server.servlet.context-path=/api

# IMPORTANT FOR RAILWAY / HTTPS PROXY
server.forward-headers-strategy=framework
server.tomcat.redirect-context-root=false


# =====================================================
# POSTGRESQL DATABASE
# =====================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_rental_db}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kalyani4}

spring.datasource.driver-class-name=org.postgresql.Driver


# =====================================================
# HIKARI CONNECTION POOL
# =====================================================

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}

spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}

spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}

spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1200000}


# =====================================================
# JPA / HIBERNATE
# =====================================================

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

spring.jpa.show-sql=${SHOW_SQL:false}

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# =====================================================
# JWT
# =====================================================

jwt.secret=${JWT_SECRET:RentRideLocalDevelopmentSecretKey2026VeryLongSecureValue12345678901234567890}

jwt.expiration=${JWT_EXPIRATION:86400000}


# =====================================================
# FRONTEND
# =====================================================

frontend.url=${FRONTEND_URL:http://localhost:3000}


# =====================================================
# DEFAULT ADMIN
# =====================================================

admin.email=${ADMIN_EMAIL:admin@rentride.com}

admin.password=${ADMIN_PASSWORD:Admin@123}

admin.name=${ADMIN_NAME:RentRide Admin}


# =====================================================
# JACKSON
# =====================================================

spring.jackson.serialization.write-dates-as-timestamps=false


# =====================================================
# ERROR DETAILS
# =====================================================

server.error.include-message=always

server.error.include-binding-errors=always


# =====================================================
# GOOGLE OAUTH2
# =====================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}

spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}